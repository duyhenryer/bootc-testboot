# bootc-image-builder customizations for AWS AMI
# Docs: https://github.com/osbuild/bootc-image-builder#-build-config
#
# AWS-specific notes:
#   - nvme_core.io_timeout: prevents NVMe timeout on Nitro instances during heavy I/O
#   - console=ttyS0: enables EC2 serial console (Instance Connect / Get System Log)
#   - Cloud best practice: attach EBS volumes for MongoDB data (/var/lib/mongodb)
#     rather than baking large partitions into the AMI root volume.
#     EBS can be resized, snapshotted, and backed up independently.

[[customizations.user]]
name = "devops"
# Replace with your actual SSH public key
key = "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDiJ7hHdPtK//86y6wFExtQ7cxC7VL88hoLKHuMCnckj duyne"
groups = ["wheel"]

[[customizations.filesystem]]
mountpoint = "/"
minsize = "10 GiB"

# Cloud best practice: attach EBS/Persistent Disk for MongoDB data
# rather than baking it into the root volume.
# [[customizations.filesystem]]
# mountpoint = "/var/lib/mongodb"
# minsize = "50 GiB"

[customizations.kernel]
append = "console=tty0 console=ttyS0,115200n8 nvme_core.io_timeout=4294967295"
