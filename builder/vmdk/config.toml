# bootc-image-builder customizations for VMDK (VMware / vSphere)
# Filesystem profile: onprem-stateful
# Intent: bake predictable state/log partitions for on-prem VM deployments.
# Docs: https://github.com/osbuild/bootc-image-builder#-build-config
#
# On-prem deployments: partitions are baked into the disk image.
# Adjust sizes based on customer requirements.

[[customizations.user]]
name = "devops"
# Replace with your actual SSH public key
key = "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDiJ7hHdPtK//86y6wFExtQ7cxC7VL88hoLKHuMCnckj duyne"
# SHA-512 crypt for local console login (Xen / vSphere / serial). SSH still uses key-only unless you change sshd.
# Lab plaintext documented in builder/README.md — rotate for production; regenerate hash with: openssl passwd -6
password = "$6$7kYS5QZdr9WLw8h7$WX4vG7vfNCdEr//HtFbtOcwiFaCkYu3SmJSz.ELOpE.kETnhnnlSDBZN62SFlVrUBKUFoMywwAxhrI6ZY8XJl0"
groups = ["wheel"]

[[customizations.filesystem]]
mountpoint = "/"
minsize = "10 GiB"

[[customizations.filesystem]]
mountpoint = "/var/lib/mongodb"
minsize = "50 GiB"

[[customizations.filesystem]]
mountpoint = "/var/log"
minsize = "5 GiB"

[customizations.kernel]
append = "console=tty0 console=ttyS0,115200n8"
