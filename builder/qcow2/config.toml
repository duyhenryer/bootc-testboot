# bootc-image-builder shared customizations for qcow2/raw/anaconda-iso
# Filesystem profile: portable-minimal
# Intent: keep baseline artifacts small and portable across local/lab workflows.
# Note: builder/raw/config.toml and builder/anaconda-iso/config.toml symlink here.
# Docs: https://github.com/osbuild/bootc-image-builder#-build-config

[[customizations.user]]
name = "devops"
# Replace with your actual SSH public key
key = "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDiJ7hHdPtK//86y6wFExtQ7cxC7VL88hoLKHuMCnckj duyne"
groups = ["wheel"]

[[customizations.filesystem]]
mountpoint = "/"
minsize = "10 GiB"

[customizations.kernel]
append = "console=tty0 console=ttyS0,115200n8"
