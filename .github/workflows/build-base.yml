name: Build base images

on:
  push:
    branches:
      - main
    paths:
      - 'base/**'
      - '.github/workflows/build-base.yml'
      - '.github/actions/**'
    tags: ['base-v*']      # Release: git tag base-v1.0.0
  workflow_call:
  workflow_dispatch:
    inputs:
      distro:
        description: 'Base distro to build'
        default: 'all'
        type: choice
        options:
          - all
          - centos-stream9
          - centos-stream10
          - fedora-40
          - fedora-41
      platforms:
        description: 'Platforms to build (comma-separated); amd64 only for now'
        required: true
        default: 'linux/amd64'

env:
  REGISTRY: ghcr.io
  BASE_IMAGE: ghcr.io/${{ github.repository }}-base

jobs:
  # --- Optional future aarch64 (not enabled; CI is linux/amd64 only) ---
  # To restore arm64: set platforms to include linux/arm64 (e.g. linux/amd64,linux/arm64) on push/dispatch;
  # in the matrix loop below, use RUNNER=ubuntu-24.04-arm when ARCH=arm64 else ubuntu-latest.
  # Per-arch tags already use -${{ matrix.arch }} (e.g. ...-latest-amd64).
  # ---
  matrix:
    name: Set build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      distros: ${{ steps.set.outputs.distros }}
      platforms: ${{ steps.set.outputs.platforms }}
    steps:
      - id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PLATFORMS="${{ inputs.platforms }}"
            DISTRO="${{ inputs.distro }}"
          else
            PLATFORMS="linux/amd64"
            DISTRO="all"
          fi

          echo "platforms=$PLATFORMS" >> "$GITHUB_OUTPUT"

          if [ "$DISTRO" = "all" ] || [ -z "$DISTRO" ]; then
            DISTROS=("centos-stream9" "centos-stream10" "fedora-40" "fedora-41")
          else
            DISTROS=("$DISTRO")
          fi

          DISTROS_CSV=$(IFS=','; echo "${DISTROS[*]}")
          echo "distros=$DISTROS_CSV" >> "$GITHUB_OUTPUT"

          MATRIX='{"include":['
          first=1
          IFS=',' read -ra PLATFORM_ARRAY <<< "$PLATFORMS"

          for D in "${DISTROS[@]}"; do
            for PLATFORM in "${PLATFORM_ARRAY[@]}"; do
              ARCH="${PLATFORM#linux/}"
              RUNNER="ubuntu-latest"
              if [ $first -eq 0 ]; then MATRIX+=","; fi
              first=0
              MATRIX+="{\"distro\":\"$D\",\"platform\":\"$PLATFORM\",\"arch\":\"$ARCH\",\"runner\":\"$RUNNER\"}"
            done
          done
          MATRIX+=']}'

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build-base:
    name: Build ${{ matrix.distro }} (${{ matrix.arch }})
    needs: matrix
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/free-disk-space

      - uses: ./.github/actions/compute-version
        id: version
        with:
          tag-prefix: base-v

      - name: Determine Dockerfile path
        id: path
        run: |
          case "${{ matrix.distro }}" in
            centos-stream9) echo "path=centos/stream9" >> "$GITHUB_OUTPUT" ;;
            centos-stream10) echo "path=centos/stream10" >> "$GITHUB_OUTPUT" ;;
            fedora-40) echo "path=fedora/40" >> "$GITHUB_OUTPUT" ;;
            fedora-41) echo "path=fedora/41" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Build base image
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAGS="-t ${{ env.BASE_IMAGE }}:${{ matrix.distro }}-latest-${{ matrix.arch }}"
          if [ "$VERSION" != "latest" ]; then
            TAGS="$TAGS -t ${{ env.BASE_IMAGE }}:${{ matrix.distro }}-${VERSION}-${{ matrix.arch }}"
          fi
          podman build --platform ${{ matrix.platform }} $TAGS \
            -f base/${{ steps.path.outputs.path }}/Containerfile .

      - name: Strict lint
        run: podman run --rm ${{ env.BASE_IMAGE }}:${{ matrix.distro }}-latest-${{ matrix.arch }} bootc container lint --fatal-warnings || exit 1

      - name: Login to GHCR
        run: echo "${{ github.token }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push arch-specific base image
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          podman push ${{ env.BASE_IMAGE }}:${{ matrix.distro }}-latest-${{ matrix.arch }}
          if [ "$VERSION" != "latest" ]; then
            podman push ${{ env.BASE_IMAGE }}:${{ matrix.distro }}-${VERSION}-${{ matrix.arch }}
          fi

  create-manifest:
    name: Create multi-platform manifests
    needs: [matrix, build-base]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/create-manifest
        with:
          image: ${{ env.BASE_IMAGE }}
          distros: ${{ needs.matrix.outputs.distros }}
          version: ${{ needs.build-base.outputs.version }}
          platforms: ${{ needs.matrix.outputs.platforms }}
          github-token: ${{ github.token }}
          github-actor: ${{ github.actor }}
