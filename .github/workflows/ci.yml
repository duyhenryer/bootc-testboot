name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "Containerfile"
      - "repos/**"
      - "base/**"
      - "bootc/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_ROOT: ghcr.io/${{ github.repository }}
  GO_VERSION: "1.25"

jobs:
  # ---------------------------------------------------------------------------
  # Hadolint — Containerfile best practices
  # ---------------------------------------------------------------------------
  hadolint:
    name: Hadolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Containerfile
          failure-threshold: warning
          # DL3003: WORKDIR — cd in && chain is fine
          # DL3006: tag version — base image tag is an ARG
          # DL3008,DL3013,DL3033,DL3041: pin versions — not applicable to bootc base images
          # SC2015: A && B || C — intentional || true fallback pattern
          # SC3009: brace expansion — we use bash, not sh
          ignore: DL3003,DL3006,DL3008,DL3013,DL3033,DL3041,SC2015,SC3009

  # ---------------------------------------------------------------------------
  # ShellCheck — lint all shell scripts
  # ---------------------------------------------------------------------------
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .
          additional_files: "*.sh"
          severity: warning

  # ---------------------------------------------------------------------------
  # SELinux module syntax — compile .te files to catch type errors early
  # ---------------------------------------------------------------------------
  selinux-check:
    name: SELinux modules compile
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos-bootc/centos-bootc:stream9
    steps:
      - uses: actions/checkout@v6
      - name: Install build tools
        run: dnf install -y checkpolicy
      - name: Compile all .te modules
        run: |
          FAILED=0
          for te in $(find bootc/ -name '*.te' -type f); do
            MOD="${te%.te}.mod"
            echo "==> Compiling $te"
            if checkmodule -M -m -o "$MOD" "$te"; then
              echo "    OK"
              rm -f "$MOD"
            else
              echo "    FAILED"
              FAILED=1
            fi
          done
          exit $FAILED

  # ---------------------------------------------------------------------------
  # Go tests
  # ---------------------------------------------------------------------------
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        run: |
          for d in repos/*/; do
            if [ -f "$d/go.mod" ]; then
              echo "==> Testing $d"
              (cd "$d" && go test -v ./...)
            fi
          done

  # --- PR builds are linux/amd64 only (matches main workflows). Optional arm64 would need
  #     matching --platform and runner (e.g. ubuntu-24.04-arm); not used in this repo today.
  # ---------------------------------------------------------------------------
  # PR check: build ALL bases + app image + strict lint (no push)
  # ---------------------------------------------------------------------------
  pr-check:
    name: PR check ${{ matrix.distro }}
    runs-on: ubuntu-latest
    needs: [test, hadolint, shellcheck, selinux-check]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        distro:
          - centos-stream9
          - centos-stream10
          - fedora-40
          - fedora-41
        include:
          - distro: centos-stream9
            containerfile_path: centos/stream9
          - distro: centos-stream10
            containerfile_path: centos/stream10
          - distro: fedora-40
            containerfile_path: fedora/40
          - distro: fedora-41
            containerfile_path: fedora/41
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/free-disk-space

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go applications
        run: make apps

      - name: Build base image (${{ matrix.distro }})
        run: |
          podman build --platform linux/amd64 \
            -f base/${{ matrix.containerfile_path }}/Containerfile \
            -t ${{ env.IMAGE_ROOT }}/base/${{ matrix.distro }}:latest .

      - name: Lint base image
        run: podman run --rm ${{ env.IMAGE_ROOT }}/base/${{ matrix.distro }}:latest bootc container lint --fatal-warnings || exit 1

      - name: Build app image (${{ matrix.distro }})
        run: |
          podman build --platform linux/amd64 \
            --build-arg IMAGE_ROOT=${{ env.IMAGE_ROOT }} \
            --build-arg BASE_DISTRO=${{ matrix.distro }} \
            --build-arg BASE_IMAGE_VERSION=latest \
            --build-arg GIT_SHA=${{ github.sha }} \
            -t ${{ env.IMAGE_ROOT }}/${{ matrix.distro }}:pr-check \
            -f Containerfile .

      - name: Bootc version
        run: |
          echo "=== bootc RPM / CLI — ${{ matrix.distro }} (app image :pr-check) ==="
          podman run --rm ${{ env.IMAGE_ROOT }}/${{ matrix.distro }}:pr-check \
            bash -c 'rpm -q bootc 2>/dev/null || true; bootc --version 2>/dev/null || true'

      - name: Lint app image
        run: podman run --rm ${{ env.IMAGE_ROOT }}/${{ matrix.distro }}:pr-check bootc container lint --fatal-warnings || exit 1

      - name: Smoke test
        run: |
          podman tag ${{ env.IMAGE_ROOT }}/${{ matrix.distro }}:pr-check ${{ env.IMAGE_ROOT }}/${{ matrix.distro }}:latest
          make test-smoke-run APP_IMAGE_REF=${{ env.IMAGE_ROOT }}/${{ matrix.distro }} VERSION=latest

      - name: Trivy CVE scan (informational)
        run: |
          podman save ${{ env.IMAGE_ROOT }}/${{ matrix.distro }}:pr-check -o /tmp/bootc-app.tar
          podman run --rm -v /tmp/bootc-app.tar:/scan.tar:ro docker.io/aquasec/trivy:0.69.3 \
            image --input /scan.tar --scanners vuln --severity HIGH,CRITICAL --exit-code 0

  # ---------------------------------------------------------------------------
  # VM smoke test — boot as real VM via bcvk, verify all services
  # Runs on every PR for all distros (full matrix).
  # Uses nested KVM on GitHub-hosted ubuntu runners.
  # Ref: bootc upstream uses the same approach (bcvk + tmt + nested KVM).
  # ---------------------------------------------------------------------------
  test-vm:
    name: VM smoke test ${{ matrix.distro }}
    runs-on: ubuntu-latest
    needs: [test, hadolint, shellcheck, selinux-check]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        distro:
          - centos-stream9
          - centos-stream10
          - fedora-40
          - fedora-41
        include:
          - distro: centos-stream9
            containerfile_path: centos/stream9
          - distro: centos-stream10
            containerfile_path: centos/stream10
          - distro: fedora-40
            containerfile_path: fedora/40
          - distro: fedora-41
            containerfile_path: fedora/41
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/free-disk-space

      # --- Enable KVM ---
      # GitHub-hosted runners have /dev/kvm but permissions are 0660 (root:kvm).
      # The runner user is not in the kvm group. Fix permissions to 0666.
      # This is the same approach used by bootc upstream and Android emulator CI.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm

      # --- Install Rust toolchain (for bcvk + virtiofsd) ---
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo binaries
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-vm-tools-${{ runner.os }}-v1

      # --- Install bcvk + virtiofsd ---
      # virtiofsd from apt is 1.10.x (too old for bcvk 0.13+, needs >= 1.12.0).
      # Build from crates.io. bcvk has no deb package — install from git.
      - name: Install bcvk and virtiofsd
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-system-x86 libseccomp-dev libcap-ng-dev
          if ! command -v virtiofsd &>/dev/null || [[ "$(virtiofsd --version 2>/dev/null | grep -oP '\d+\.\d+' | head -1)" < "1.12" ]]; then
            cargo install virtiofsd
            sudo cp ~/.cargo/bin/virtiofsd /usr/libexec/virtiofsd
          fi
          if ! command -v bcvk &>/dev/null; then
            cargo install --locked --git https://github.com/bootc-dev/bcvk bcvk
          fi
          echo "bcvk=$(bcvk --version 2>/dev/null || echo 'not found')"
          echo "virtiofsd=$(virtiofsd --version 2>/dev/null || echo 'not found')"

      # --- Build image (same as pr-check) ---
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go applications
        run: make apps

      - name: Override SSH root login for CI VM smoke test
        run: |
          cat > base/rootfs/etc/ssh/sshd_config.d/00-ci-vm-smoke-test.conf <<'EOF'
          # Temporary CI-only override for bcvk VM smoke tests.
          # pull_request runs test the merge ref, where main currently sets
          # PermitRootLogin no and blocks bcvk's root SSH flow.
          PermitRootLogin prohibit-password
          EOF
          sed -n '1,40p' base/rootfs/etc/ssh/sshd_config.d/00-ci-vm-smoke-test.conf

      - name: Build base image (${{ matrix.distro }})
        run: |
          podman build --isolation chroot --platform linux/amd64 \
            -f base/${{ matrix.containerfile_path }}/Containerfile \
            -t ${{ env.IMAGE_ROOT }}/base/${{ matrix.distro }}:latest .

      - name: Build app image (${{ matrix.distro }})
        run: |
          podman build --isolation chroot --platform linux/amd64 \
            --build-arg IMAGE_ROOT=${{ env.IMAGE_ROOT }} \
            --build-arg BASE_DISTRO=${{ matrix.distro }} \
            --build-arg BASE_IMAGE_VERSION=latest \
            --build-arg GIT_SHA=${{ github.sha }} \
            -t ${{ env.IMAGE_ROOT }}/${{ matrix.distro }}:latest \
            -f Containerfile .

      # --- Run VM test ---
      - name: VM smoke test (${{ matrix.distro }})
        run: ./scripts/vm-test.sh "${{ env.IMAGE_ROOT }}/${{ matrix.distro }}:latest"
