name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "Containerfile"
      - "repos/**"
      - "base/**"
      - "bootc/**"

env:
  IMAGE_ROOT: ghcr.io/${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Go tests
  # ---------------------------------------------------------------------------
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Run tests
        run: |
          for d in repos/*/; do
            if [ -f "$d/go.mod" ]; then
              echo "==> Testing $d"
              (cd "$d" && go test -v ./...)
            fi
          done

  # --- PR builds are linux/amd64 only (matches main workflows). Optional arm64 would need
  #     matching --platform and runner (e.g. ubuntu-24.04-arm); not used in this repo today.
  # ---------------------------------------------------------------------------
  # PR check: build + strict lint (no push)
  # ---------------------------------------------------------------------------
  pr-check:
    name: PR check (build + lint)
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/free-disk-space

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Build Go applications
        run: make apps

      - name: Build base image (local)
        run: |
          podman build --platform linux/amd64 \
            -f base/centos/stream9/Containerfile \
            -t ${{ env.IMAGE_ROOT }}/base/centos-stream9:latest .

      - name: Build image (amd64 only)
        run: |
          podman build --platform linux/amd64 \
            --build-arg IMAGE_ROOT=${{ env.IMAGE_ROOT }} \
            --build-arg BASE_DISTRO=centos-stream9 \
            --build-arg BASE_IMAGE_VERSION=latest \
            --build-arg GIT_SHA=${{ github.sha }} \
            -t ${{ env.IMAGE_ROOT }}/centos-stream9:pr-check \
            -f Containerfile .

      - name: Strict lint
        run: podman run --rm ${{ env.IMAGE_ROOT }}/centos-stream9:pr-check bootc container lint --fatal-warnings || exit 1
