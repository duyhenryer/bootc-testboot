name: Build bootc image

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - "Containerfile"
      - "repos/**"
      - "base/**"
      - "bootc/**"
  workflow_dispatch:
    inputs:
      base_distro:
        description: 'Base distro to build on'
        default: 'centos-stream9'
        type: choice
        options:
          - centos-stream9
          - centos-stream10
          - fedora-40
          - fedora-41
      platforms:
        description: 'Platforms to build (comma-separated); amd64 only for now'
        required: true
        default: 'linux/amd64'

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}
  BASE_IMAGE: ghcr.io/${{ github.repository }}-base

jobs:
  # --- Optional future aarch64 (not enabled; CI is linux/amd64 only) ---
  # To restore arm64: default or workflow_dispatch inputs.platforms may include linux/arm64;
  # in the matrix loop below, use RUNNER=ubuntu-24.04-arm when ARCH=arm64 else ubuntu-latest.
  # Align with build-base.yml (base images must exist per arch before bootc build).
  # ---
  # ---------------------------------------------------------------------------
  # Build matrix computation
  # ---------------------------------------------------------------------------
  matrix:
    name: Set build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      distros: ${{ steps.set.outputs.distros }}
      platforms: ${{ steps.set.outputs.platforms }}
    steps:
      - id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PLATFORMS="${{ inputs.platforms }}"
            DISTROS=("${{ inputs.base_distro }}")
          else
            PLATFORMS="linux/amd64"
            DISTROS=("centos-stream9" "centos-stream10" "fedora-40" "fedora-41")
          fi

          DISTROS_CSV=$(IFS=','; echo "${DISTROS[*]}")
          echo "distros=$DISTROS_CSV" >> "$GITHUB_OUTPUT"
          echo "platforms=$PLATFORMS" >> "$GITHUB_OUTPUT"

          MATRIX='{"include":['
          first=1
          IFS=',' read -ra PLATFORM_ARRAY <<< "$PLATFORMS"
          for D in "${DISTROS[@]}"; do
            for PLATFORM in "${PLATFORM_ARRAY[@]}"; do
              ARCH="${PLATFORM#linux/}"
              RUNNER="ubuntu-latest"
              if [ $first -eq 0 ]; then MATRIX+=","; fi
              first=0
              MATRIX+="{\"distro\":\"$D\",\"platform\":\"$PLATFORM\",\"arch\":\"$ARCH\",\"runner\":\"$RUNNER\"}"
            done
          done
          MATRIX+=']}'
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Go tests
  # ---------------------------------------------------------------------------
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Run tests
        run: |
          for d in repos/*/; do
            if [ -f "$d/go.mod" ]; then
              echo "==> Testing $d"
              (cd "$d" && go test -v ./...)
            fi
          done

  # ---------------------------------------------------------------------------
  # Build app image (platform matrix; default linux/amd64 only)
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.distro }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [matrix, test]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/free-disk-space

      - uses: ./.github/actions/compute-version
        id: version
        with:
          tag-prefix: v

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build Go applications
        run: make apps VERSION=${{ steps.version.outputs.version }}

      - name: Build app image
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAGS="-t ${{ env.IMAGE }}:${{ matrix.distro }}-latest-${{ matrix.arch }}"
          if [ "$VERSION" != "latest" ]; then
            TAGS="$TAGS -t ${{ env.IMAGE }}:${{ matrix.distro }}-${VERSION}-${{ matrix.arch }}"
          fi
          podman build --platform ${{ matrix.platform }} \
            --build-arg BASE_DISTRO=${{ matrix.distro }} \
            --build-arg BASE_IMAGE_VERSION=latest \
            --build-arg GIT_SHA=${{ github.sha }} \
            $TAGS \
            -f Containerfile .

      - name: Strict lint
        run: podman run --rm ${{ env.IMAGE }}:${{ matrix.distro }}-latest-${{ matrix.arch }} bootc container lint --fatal-warnings || exit 1

      - name: Login to GHCR
        run: echo "${{ github.token }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push arch-specific image
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          podman push ${{ env.IMAGE }}:${{ matrix.distro }}-latest-${{ matrix.arch }}
          if [ "$VERSION" != "latest" ]; then
            podman push ${{ env.IMAGE }}:${{ matrix.distro }}-${VERSION}-${{ matrix.arch }}
          fi

  # ---------------------------------------------------------------------------
  # Create multi-platform manifests
  # ---------------------------------------------------------------------------
  create-manifest:
    name: Create multi-platform manifests
    needs: [matrix, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/create-manifest
        with:
          image: ${{ env.IMAGE }}
          distros: ${{ needs.matrix.outputs.distros }}
          version: ${{ needs.build.outputs.version }}
          platforms: ${{ needs.matrix.outputs.platforms }}
          github-token: ${{ github.token }}
          github-actor: ${{ github.actor }}
