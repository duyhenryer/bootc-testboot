name: Build bootc image

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - "Containerfile"
      - "repos/**"
      - "bootc/**"
      # NOTE: base/** is NOT listed here. When base/ changes, build-base.yml runs
      # first (its own path trigger), then calls this workflow via workflow_call.
      # This prevents a race where bootc builds against a stale base image.
  workflow_call:            # Called by build-base.yml after base images are pushed
  schedule:
    - cron: '0 8 * * 1'   # Weekly Monday 08:00 UTC — rebuild app image after base refresh
  workflow_dispatch:
    inputs:
      base_distro:
        description: 'Base distro to build (default: all)'
        default: 'all'
        type: choice
        options:
          - all
          - centos-stream9
          - centos-stream10
          - fedora-40
          - fedora-41
      platforms:
        description: 'Platforms to build (comma-separated); amd64 only for now'
        required: true
        default: 'linux/amd64'

env:
  REGISTRY: ghcr.io
  IMAGE_ROOT: ghcr.io/${{ github.repository }}

jobs:
  # --- Optional future aarch64 (not enabled; CI is linux/amd64 only) ---
  # App image: IMAGE_ROOT/<distro>:latest (path-style; no -arch in tag).
  # ---
  # ---------------------------------------------------------------------------
  # Build matrix computation
  # ---------------------------------------------------------------------------
  matrix:
    name: Set build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      distros: ${{ steps.set.outputs.distros }}
      platforms: ${{ steps.set.outputs.platforms }}
    steps:
      - id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PLATFORMS="${{ inputs.platforms }}"
            DISTRO="${{ inputs.base_distro }}"
          else
            PLATFORMS="linux/amd64"
            DISTRO="all"
          fi

          if [ "$DISTRO" = "all" ] || [ -z "$DISTRO" ]; then
            DISTROS=("centos-stream9" "centos-stream10" "fedora-40" "fedora-41")
          else
            DISTROS=("$DISTRO")
          fi

          DISTROS_CSV=$(IFS=','; echo "${DISTROS[*]}")
          echo "distros=$DISTROS_CSV" >> "$GITHUB_OUTPUT"
          echo "platforms=$PLATFORMS" >> "$GITHUB_OUTPUT"

          MATRIX='{"include":['
          first=1
          IFS=',' read -ra PLATFORM_ARRAY <<< "$PLATFORMS"
          for D in "${DISTROS[@]}"; do
            for PLATFORM in "${PLATFORM_ARRAY[@]}"; do
              ARCH="${PLATFORM#linux/}"
              RUNNER="ubuntu-latest"
              if [ $first -eq 0 ]; then MATRIX+=","; fi
              first=0
              MATRIX+="{\"distro\":\"$D\",\"platform\":\"$PLATFORM\",\"arch\":\"$ARCH\",\"runner\":\"$RUNNER\"}"
            done
          done
          MATRIX+=']}'
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Go tests
  # ---------------------------------------------------------------------------
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Run tests
        run: |
          for d in repos/*/; do
            if [ -f "$d/go.mod" ]; then
              echo "==> Testing $d"
              (cd "$d" && go test -v ./...)
            fi
          done

  # ---------------------------------------------------------------------------
  # Build app image (platform matrix; default linux/amd64 only)
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.distro }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [matrix, test]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/free-disk-space

      - uses: ./.github/actions/compute-version
        id: version
        with:
          tag-prefix: v

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Build Go applications
        run: make apps VERSION=${{ steps.version.outputs.version }}

      - name: Build app image
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REF="${{ env.IMAGE_ROOT }}/${{ matrix.distro }}"
          TAGS="-t ${REF}:latest"
          if [ "$VERSION" != "latest" ]; then
            TAGS="$TAGS -t ${REF}:${VERSION}"
          fi
          podman build --platform ${{ matrix.platform }} \
            --build-arg IMAGE_ROOT=${{ env.IMAGE_ROOT }} \
            --build-arg BASE_DISTRO=${{ matrix.distro }} \
            --build-arg BASE_IMAGE_VERSION=latest \
            --build-arg GIT_SHA=${{ github.sha }} \
            $TAGS \
            -f Containerfile .

      - name: Bootc version
        run: |
          echo "=== bootc RPM / CLI — ${{ matrix.distro }} (app image :latest) ==="
          podman run --rm ${{ env.IMAGE_ROOT }}/${{ matrix.distro }}:latest \
            bash -c 'rpm -q bootc 2>/dev/null || true; bootc --version 2>/dev/null || true'

      - name: Strict lint
        run: podman run --rm ${{ env.IMAGE_ROOT }}/${{ matrix.distro }}:latest bootc container lint --fatal-warnings || exit 1

      - name: Login to GHCR
        run: echo "${{ github.token }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push app image
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REF="${{ env.IMAGE_ROOT }}/${{ matrix.distro }}"
          podman push "${REF}:latest"
          if [ "$VERSION" != "latest" ]; then
            podman push "${REF}:${VERSION}"
          fi
