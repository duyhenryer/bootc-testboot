<text x="16" y="28" fill="#475569" font-size="13">Upgrade lifecycle (equivalent to stateDiagram-v2)</text><circle cx="36" cy="120" r="8" fill="#334155"/><line x1="44" y1="120" x2="92" y2="120" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)" /><text x="48" y="108" fill="#475569" font-size="10">Boot</text><g><rect x="92" y="96" rx="6" ry="6" width="96" height="48" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/><text x="140.0" y="120.0" text-anchor="middle" fill="#0f172a" font-size="12"><tspan x="140.0" dy="0" text-anchor="middle">Running</tspan></text></g><line x1="188" y1="120" x2="228" y2="120" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)" /><text x="190" y="108" fill="#475569" font-size="9">--download-only</text><g><rect x="228" y="96" rx="6" ry="6" width="118" height="48" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/><text x="287.0" y="120.0" text-anchor="middle" fill="#0f172a" font-size="12"><tspan x="287.0" dy="0" text-anchor="middle">DownloadOnly</tspan></text></g><line x1="346" y1="120" x2="386" y2="120" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)" /><text x="348" y="108" fill="#475569" font-size="9">downloaded</text><g><rect x="386" y="96" rx="6" ry="6" width="88" height="48" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/><text x="430.0" y="120.0" text-anchor="middle" fill="#0f172a" font-size="12"><tspan x="430.0" dy="0" text-anchor="middle">Staged</tspan></text></g><path d="M 430 144 C 360 200 240 200 188 120" fill="none" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)" /><text x="220" y="200" fill="#475569" font-size="10">No reboot yet</text><line x1="474" y1="120" x2="514" y2="120" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)" /><text x="476" y="108" fill="#475569" font-size="9">--apply</text><g><rect x="514" y="96" rx="6" ry="6" width="88" height="48" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/><text x="558.0" y="120.0" text-anchor="middle" fill="#0f172a" font-size="12"><tspan x="558.0" dy="0" text-anchor="middle">Apply</tspan></text></g><line x1="602" y1="120" x2="642" y2="120" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)" /><text x="604" y="108" fill="#475569" font-size="9">bootloader</text><g><rect x="642" y="96" rx="6" ry="6" width="96" height="48" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/><text x="690.0" y="120.0" text-anchor="middle" fill="#0f172a" font-size="12"><tspan x="690.0" dy="0" text-anchor="middle">Reboot</tspan></text></g><line x1="738" y1="120" x2="780" y2="120" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)" /><text x="740" y="108" fill="#475569" font-size="9">active</text><circle cx="800" cy="120" r="12" fill="none" stroke="#334155" stroke-width="2"/><circle cx="800" cy="120" r="5" fill="#334155"/></svg>