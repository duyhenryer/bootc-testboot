# Limit cloud-init datasource probing to the targets we actually deploy to.
# Speeds up first boot ~20-30s by skipping irrelevant datasources (Azure,
# OpenStack, AltCloud, ConfigDrive, Hetzner, etc). Order = priority.
#
# Add new entries here when adding a new deployment target. Keep `None` last
# as a graceful no-op fallback when no datasource matches.
datasource_list: [ Ec2, GCE, VMware, OVF, NoCloud, None ]
