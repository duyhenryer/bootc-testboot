# RabbitMQ configuration (immutable -- shipped in /usr/share/, read-only at runtime)
# Data persists in /var/lib/rabbitmq/ across upgrades and rollbacks.
# Erlang cookie at /var/lib/rabbitmq/.erlang.cookie is auto-generated on first boot.
#
# Reference: https://www.rabbitmq.com/docs/configure

listeners.tcp.default = 5672

default_vhost = /
default_user = guest
default_pass = guest

log.dir = /var/log/rabbitmq
log.file = rabbit.log
log.file.level = info

vm_memory_high_watermark.relative = 0.4
disk_free_limit.absolute = 1GB

management.tcp.port = 15672
