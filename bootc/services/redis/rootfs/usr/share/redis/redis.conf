# Redis configuration (immutable -- shipped in /usr/share/, read-only at runtime)
# Data persists in /var/lib/redis/ across upgrades and rollbacks.
#
# Reference: https://redis.io/docs/latest/operate/oss_and_stack/management/config/

bind 127.0.0.1
port 6379
daemonize no

dir /var/lib/redis
dbfilename dump.rdb

logfile /var/log/redis/redis.log
loglevel notice

save 900 1
save 300 10
save 60 10000

maxmemory 256mb
maxmemory-policy allkeys-lru
