# MongoDB configuration (immutable -- shipped in /usr/share/, read-only at runtime)
# Data, logs, certs, and credentials persist in /var/ across upgrades and rollbacks.
# SELinux: modules installed at build time via semodule — see Containerfile and docs/project/009-selinux-mongodb.md.
#
# Reference: https://www.mongodb.com/docs/manual/reference/configuration-options/

storage:
  dbPath: /var/lib/mongodb

systemLog:
  destination: file
  path: /var/log/mongodb/mongod.log
  logAppend: true

net:
  port: 27017
  bindIp: 127.0.0.1
  tls:
    mode: preferTLS
    certificateKeyFile: /var/lib/mongodb/tls/server.pem
    CAFile: /var/lib/mongodb/tls/ca.pem

replication:
  replSetName: rs0

security:
  authorization: enabled
  keyFile: /var/lib/mongodb/.keyFile

processManagement:
  timeZoneInfo: /usr/share/zoneinfo
