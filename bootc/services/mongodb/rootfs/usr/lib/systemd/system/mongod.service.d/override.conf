[Unit]
After=mongodb-setup.service

[Service]
Environment="OPTIONS=-f /usr/share/mongodb/mongod.conf"
StateDirectory=mongodb
LogsDirectory=mongodb
# Relabel /var/lib/mongodb with the fcontext rule baked at build time.
# Runs before every start; safe because restorecon is idempotent.
ExecStartPre=/usr/sbin/restorecon -RFv /var/lib/mongodb
