# Valkey configuration (immutable — shipped in /usr/share/, read-only at runtime)
# Data persists in /var/lib/valkey/ across upgrades and rollbacks.
# Wire protocol matches Redis (port 6379).
#
# Reference: https://valkey.io/topics/config/

bind 0.0.0.0
protected-mode yes
port 6379
daemonize no

dir /var/lib/valkey
dbfilename dump.rdb

logfile /var/log/valkey/valkey.log
loglevel notice

save 900 1
save 300 10
save 60 10000

maxmemory 256mb
maxmemory-policy allkeys-lru

# Auth — requirepass written by valkey-setup.service before valkey.service starts.
# File guaranteed to exist by ordering: valkey-setup.service Before=valkey.service.
include /etc/valkey/auth.conf
