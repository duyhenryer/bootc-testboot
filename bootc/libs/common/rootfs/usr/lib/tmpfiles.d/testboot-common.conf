# Shared persistent directories (parent for all app StateDirectory/LogsDirectory)
d /var/lib/bootc-testboot 0755 root root -
d /var/log/bootc-testboot 0755 root root -

# Shared resources: env files and TLS certs readable by all app service users
d /var/lib/bootc-testboot/shared         0750 root    apps - -
d /var/lib/bootc-testboot/shared/tls    0750 root    apps - -
d /var/lib/bootc-testboot/shared/env    0750 root    apps - -
