# Shared persistent directories (parent for all app StateDirectory/LogsDirectory)
d /var/lib/bootc-testboot 0755 root root -
d /var/log/bootc-testboot 0755 root root -

# Base OS directories (duplicated from base-requirements.conf to survive overlay merges)
d /var/lib/cloud                        0755 root    root    - -
d /var/lib/dhcpcd                       0755 root    dhcpcd  - -
d /var/lib/dhclient                     0755 root    root    - -
d /var/lib/pcp                          0755 root    root    - -
d /var/lib/pcp/config                   0755 root    root    - -
d /var/lib/pcp/config/derived           0755 root    root    - -
d /var/lib/rhsm                         0755 root    root    - -
d /var/lib/bootc-testboot/shared         0750 root    bootc-apps - -
d /var/lib/bootc-testboot/shared/tls    0750 root    bootc-apps - -
d /var/lib/bootc-testboot/shared/env    0750 root    bootc-apps - -
d /var/roothome/buildinfo               0755 root    root    - -
d /var/roothome/buildinfo/content_manifests 0755 root root   - -
